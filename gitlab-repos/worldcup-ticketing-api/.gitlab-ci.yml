stages:
  - install
  - lint
  - test
  - security_scan
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/

install:
  stage: install
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov flake8

lint:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install flake8
    - flake8 app/ --max-line-length 120 --statistics
  allow_failure: true

test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
    - pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

security_scan:
  stage: security_scan
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install safety
    - safety check -r requirements.txt
  allow_failure: true

build_docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t worldcup-ticketing-api:${CI_COMMIT_SHA} .
  only:
    - main
    - develop

deploy_staging:
  stage: deploy
  image: google/cloud-sdk:slim
  script:
    - echo "Deploying ticketing-api to staging..."
    - gcloud run deploy worldcup-ticketing-api-staging --source . --region us-central1 --no-allow-unauthenticated
  environment:
    name: staging
    url: https://staging-tickets.copa2026.dev
  only:
    - develop
  when: manual

deploy_production:
  stage: deploy
  image: google/cloud-sdk:slim
  script:
    - echo "Deploying ticketing-api to production..."
    - gcloud run deploy worldcup-ticketing-api --source . --region us-central1 --no-allow-unauthenticated --min-instances 3 --max-instances 50
  environment:
    name: production
    url: https://tickets.copa2026.com
  only:
    - main
  when: manual
